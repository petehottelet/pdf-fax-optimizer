name: pdf-fax-optimizer
display_name: PDF FAX
description: >-
  Maximize document quality and readability over a fax network — convert a PDF,
  Word, PowerPoint, Excel, or image file to a 1-bit CCITT-G4 PDF/TIFF that arrives
  LEGIBLE after Group-3 transmission (a fax's whole job is to be read), and
  optionally send it via a cloud fax API.
