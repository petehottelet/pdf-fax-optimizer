name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev tools
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -ra --cov=pdf_fax_optimizer --cov-report=term-missing

  # OCR (rapidocr-onnxruntime) is a large optional dependency; keep it off the
  # main matrix so CI stays fast, and allow this job to fail/skip if wheels for
  # the runner aren't available.
  ocr-smoke:
    name: ocr smoke (py3.11)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install with OCR extra
        run: python -m pip install -e ".[dev,ocr]"
      - name: Run OCR-marked tests
        run: pytest -ra -m ocr
