name: Publish to PyPI

# Publishing a GitHub Release is the single release action: it builds the
# sdist + wheel, publishes them to PyPI via Trusted Publishing (OIDC — no token
# stored anywhere), and attaches the agent-skill zip to the same release.
#
# PyPI Trusted Publisher must be configured with:
#   repository: petehottelet/pdf-fax-optimizer
#   workflow:   publish.yml      (this file's name)
#   environment: pypi
on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade build twine
          python -m build

      - name: Check metadata
        run: twine check dist/*

      - name: Verify the built wheel installs and ships its assets
        run: |
          python -m venv /tmp/verify
          /tmp/verify/bin/python -m pip install --upgrade pip
          /tmp/verify/bin/python -m pip install dist/*.whl
          /tmp/verify/bin/python - <<'PY'
          import os
          from pdf_fax_optimizer import __version__, fax_pipeline as f
          assert __version__, "missing __version__"
          for name in ("bluenoise_64.npy", "greennoise_64_s4.0.npy", "Oswald.ttf"):
              p = os.path.join(f._ASSETS_DIR, name)
              assert os.path.exists(p), f"bundled asset missing from wheel: {name}"
          print("wheel OK:", __version__, "assets at", f._ASSETS_DIR)
          PY

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI + attach skill zip
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # MUST match the environment name on PyPI
    permissions:
      id-token: write          # required for trusted publishing (OIDC)
      contents: write          # required to upload the skill zip to the release
    steps:
      - uses: actions/checkout@v7

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Build the agent-skill zip
        run: |
          zip -r pdf-fax-optimizer.zip pdf-fax-optimizer \
            -x '*/__pycache__/*' '*.pyc'

      - name: Attach skill zip to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" pdf-fax-optimizer.zip --clobber
